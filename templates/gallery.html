{% extends "base.html" %}
{% block title %}Galeri{% endblock %}

{% block content %}

<section class="page-header">
  <div class="container">
    <span class="eyebrow">Galeri</span>
    <h1>Suasana Rumangsa, dari sudut ke sudut.</h1>
  </div>
</section>

<section>
  <div class="container">
    <div class="gallery-grid">
      {% for g in gallery %}
      <figure class="reveal">
        <img src="{{ url_for('static', filename=g.src) }}" alt="{{ g.caption }}" loading="lazy">
        <figcaption>{{ g.caption }}</figcaption>
      </figure>
      {% endfor %}
    </div>
  </div>
</section>

{% endblock %}
